<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flow</title>
  <style>
    :root { --sz: 422px; }
    @media (min-width: 1440px) { :root { --sz: 576px; } }
    @media (max-width: 480px)  { :root { --sz: 322px; } }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; background: #000;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; font-family: system-ui, sans-serif; cursor: none;
    }
    #wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    canvas {
      width: var(--sz); height: var(--sz);
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.06); display: block;
    }
    #meta { display: flex; align-items: center; gap: 24px; }
    #label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.2); }
    #back  { font-size: 10px; letter-spacing: 0.1em; color: rgba(255,255,255,0.15); text-decoration: none; transition: color 0.15s; }
    #back:hover { color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="c"></canvas>
    <div id="meta">
      <a href="index.html" id="back">← lab</a>
      <span id="label">flow — move + click</span>
    </div>
  </div>
<script>
  const SZ   = 422;
  const COLS = 30, ROWS = 30;
  const GAP  = SZ / COLS;
  const LEN  = 8;

  const canvas = document.getElementById('c');
  canvas.width = canvas.height = SZ;
  const ctx = canvas.getContext('2d');

  // Per-cell random phase offset for shimmer
  const phases = new Float32Array(COLS * ROWS);
  for (let i = 0; i < phases.length; i++) phases[i] = Math.random() * Math.PI * 2;

  let mx = SZ / 2, my = SZ / 2, isInside = false;
  // Ripple state — array of { x, y, born }
  const ripples = [];

  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mx = (e.clientX - r.left) * (SZ / r.width);
    my = (e.clientY - r.top)  * (SZ / r.height);
    isInside = true;
    maybeTick(e.clientX, e.clientY);
  });
  canvas.addEventListener('mouseenter', () => isInside = true);
  canvas.addEventListener('mouseleave', () => isInside = false);

  canvas.addEventListener('pointerdown', e => {
    const r = canvas.getBoundingClientRect();
    ripples.push({
      x: (e.clientX - r.left) * (SZ / r.width),
      y: (e.clientY - r.top)  * (SZ / r.height),
      born: performance.now() / 1000,
    });
    // Cap ripples
    if (ripples.length > 3) ripples.shift();
    playClick();
  });

  // Base field: smooth curl pattern
  function baseAngle(nx, ny, t) {
    const px = nx * 0.55 + t * 0.38;
    const py = ny * 0.42 - t * 0.26;
    return Math.atan2(
      Math.sin(px) + Math.sin(py + 1.1),
      Math.cos(py) + Math.cos(px - 0.9)
    );
  }

  function draw(t) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, SZ, SZ);

    const VORTEX_R = 100;

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const x = (c + 0.5) * GAP;
        const y = (r + 0.5) * GAP;

        let angle = baseAngle(c, r, t);

        // Cursor vortex — rotate local field CCW within radius
        if (isInside) {
          const dx = x - mx, dy = y - my;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < VORTEX_R) {
            const t_blend = 1 - dist / VORTEX_R;
            // Perpendicular to radial = vortex
            const vortexAngle = Math.atan2(dx, -dy);
            const diff = vortexAngle - angle;
            const wrapped = Math.atan2(Math.sin(diff), Math.cos(diff));
            angle += wrapped * t_blend * 0.7;
          }
        }

        // Ripple perturbation
        ripples.forEach(rip => {
          const age = t - rip.born;
          if (age > 2.5) return;
          const dx = x - rip.x, dy = y - rip.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const waveFront = age * 160;
          const ring = Math.abs(dist - waveFront);
          const amt = Math.exp(-ring * ring / (2 * 22 * 22)) * Math.exp(-age * 1.2) * 1.4;
          angle += amt * Math.atan2(dy, dx);
        });

        // Shimmer: brightness pulses along flow direction
        const phase = phases[r * COLS + c];
        const shimmer = 0.5 + 0.5 * Math.sin(phase + t * 2.8 - (c * 0.18 + r * 0.14));
        let alpha = 0.1 + shimmer * 0.25;

        // Cursor proximity brightens
        if (isInside) {
          const dx = x - mx, dy = y - my;
          const dist = Math.sqrt(dx * dx + dy * dy);
          alpha += Math.max(0, 1 - dist / VORTEX_R) * 0.45;
        }

        const cos = Math.cos(angle), sin = Math.sin(angle);
        // Draw with arrow head — brighter at the tip
        const x0 = x - cos * LEN / 2, y0 = y - sin * LEN / 2;
        const x1 = x + cos * LEN / 2, y1 = y + sin * LEN / 2;

        // Tail
        ctx.beginPath();
        ctx.moveTo(x0, y0);
        ctx.lineTo(x1, y1);
        ctx.strokeStyle = `rgba(255,255,255,${(alpha * 0.5).toFixed(3)})`;
        ctx.lineWidth = 0.9;
        ctx.lineCap = 'round';
        ctx.stroke();

        // Head dot (tip of arrow)
        ctx.beginPath();
        ctx.arc(x1, y1, 1.1, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(3)})`;
        ctx.fill();
      }
    }

    // Cursor dot
    if (isInside) {
      ctx.beginPath();
      ctx.arc(mx, my, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fill();
    }
  }

  // ── Audio ─────────────────────────────────────────────────────
  let AC;
  function ac() {
    if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
    if (AC.state === 'suspended') AC.resume();
    return AC;
  }

  let lastTick = { x: 0, y: 0 }, lastTickT = 0;
  function maybeTick(x, y) {
    const dx = x - lastTick.x, dy = y - lastTick.y;
    if (dx * dx + dy * dy < 20 * 20) return;
    lastTick = { x, y };
    try {
      const a = ac(), t = a.currentTime;
      if (t - lastTickT < 0.04) return;
      lastTickT = t;
      // Wind whisper
      const buf  = a.createBuffer(1, Math.floor(a.sampleRate * 0.055), a.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
      const src = a.createBufferSource(); src.buffer = buf;
      const flt = a.createBiquadFilter(); flt.type = 'bandpass'; flt.frequency.value = 1600; flt.Q.value = 1.2;
      const g   = a.createGain(); g.gain.setValueAtTime(0.04, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
      src.connect(flt); flt.connect(g); g.connect(a.destination); src.start(t);
    } catch (_) {}
  }

  function playClick() {
    try {
      const a = ac(), t = a.currentTime;
      // Vortex drop — spinning whoosh
      const o = a.createOscillator(), g = a.createGain();
      o.connect(g); g.connect(a.destination);
      o.type = 'sine'; o.frequency.setValueAtTime(440, t);
      o.frequency.exponentialRampToValueAtTime(88, t + 0.4);
      g.gain.setValueAtTime(0.18, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.42);
      o.start(t); o.stop(t + 0.43);

      const buf  = a.createBuffer(1, Math.floor(a.sampleRate * 0.15), a.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (data.length * 0.4));
      const src = a.createBufferSource(); src.buffer = buf;
      const flt = a.createBiquadFilter(); flt.type = 'highpass'; flt.frequency.value = 2000;
      const g2  = a.createGain(); g2.gain.setValueAtTime(0.1, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      src.connect(flt); flt.connect(g2); g2.connect(a.destination); src.start(t);
    } catch (_) {}
  }

  // ── Loop ─────────────────────────────────────────────────────
  const t0 = performance.now();
  (function loop() {
    const t = (performance.now() - t0) / 1000;
    draw(t);
    requestAnimationFrame(loop);
  })();
</script>
</body>
</html>
