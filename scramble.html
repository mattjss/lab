<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>scramble</title>
  <style>
    :root { --sz: 422px; }
    @media (min-width: 1440px) { :root { --sz: 576px; } }
    @media (max-width: 480px)  { :root { --sz: 322px; } }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; background: #000;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; font-family: system-ui, sans-serif; cursor: none;
    }
    #wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    #grid {
      width: var(--sz); height: var(--sz);
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.06);
      display: grid; position: relative; overflow: hidden; background: #000;
    }
    .cell {
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-family: 'SF Mono', 'Fira Mono', 'Courier New', monospace;
      font-weight: 400; letter-spacing: 0;
      color: rgba(255,255,255,0.18);
      user-select: none; line-height: 1;
      transition: color 0.4s ease, opacity 0.4s ease;
    }
    #cursor {
      position: absolute; width: 6px; height: 6px;
      border-radius: 50%; background: rgba(255,255,255,0.45);
      pointer-events: none; transform: translate(-50%, -50%);
      display: none;
    }
    #meta { display: flex; align-items: center; gap: 24px; }
    #label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.2); }
    #back  { font-size: 10px; letter-spacing: 0.1em; color: rgba(255,255,255,0.15); text-decoration: none; transition: color 0.15s; }
    #back:hover { color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="grid">
      <div id="cursor"></div>
    </div>
    <div id="meta">
      <a href="index.html" id="back">← lab</a>
      <span id="label">scramble — move + click</span>
    </div>
  </div>
<script>
  const COLS = 26, ROWS = 26;
  const RESOLVE_R = 80;   // px from cursor — cells resolve to ·
  const SCRAMBLE_R = 160; // px — cells actively scramble
  const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&'.split('');
  const REST_CHAR = '·';

  const grid = document.getElementById('grid');
  const cursorEl = document.getElementById('cursor');
  grid.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
  grid.style.gridTemplateRows    = `repeat(${ROWS}, 1fr)`;

  const cells = [];
  const timers = [];

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const el = document.createElement('div');
      el.className = 'cell';
      el.textContent = REST_CHAR;
      grid.appendChild(el);
      cells.push({ el, r, c, scrambling: false, resolving: false, timer: null });
    }
  }

  let mx = -999, my = -999, isInside = false;
  let gridRect = null;
  let cellW = 0, cellH = 0;
  let frozen = false;

  function updateRect() {
    gridRect = grid.getBoundingClientRect();
    cellW = gridRect.width / COLS;
    cellH = gridRect.height / ROWS;
  }
  updateRect();
  window.addEventListener('resize', updateRect);

  grid.addEventListener('mouseenter', () => {
    isInside = true;
    cursorEl.style.display = 'block';
  });
  grid.addEventListener('mouseleave', () => {
    isInside = false;
    cursorEl.style.display = 'none';
    resetAll();
  });
  grid.addEventListener('mousemove', e => {
    mx = e.clientX - gridRect.left;
    my = e.clientY - gridRect.top;
    cursorEl.style.left = mx + 'px';
    cursorEl.style.top  = my + 'px';
    if (!frozen) update();
    maybeTick(e.clientX, e.clientY);
  });

  grid.addEventListener('pointerdown', () => {
    if (!isInside) return;
    frozen = true;
    // Freeze scramble state — flash everything scrambled then release
    cells.forEach(cell => {
      if (cell.timer) clearInterval(cell.timer);
      cell.el.textContent = CHARS[Math.floor(Math.random() * CHARS.length)];
      cell.el.style.color = 'rgba(255,255,255,0.7)';
    });
    playClick();
    setTimeout(() => {
      frozen = false;
      update();
    }, 320);
  });

  function cellCenterX(c) { return (c + 0.5) * cellW; }
  function cellCenterY(r) { return (r + 0.5) * cellH; }

  function startScramble(cell) {
    if (cell.scrambling) return;
    cell.scrambling = true;
    cell.timer = setInterval(() => {
      cell.el.textContent = CHARS[Math.floor(Math.random() * CHARS.length)];
    }, 60);
  }

  function stopScramble(cell, char) {
    if (!cell.scrambling) return;
    clearInterval(cell.timer);
    cell.scrambling = false;
    cell.el.textContent = char;
  }

  function update() {
    cells.forEach(cell => {
      const cx = cellCenterX(cell.c);
      const cy = cellCenterY(cell.r);
      const dx = cx - mx, dy = cy - my;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < RESOLVE_R) {
        stopScramble(cell, REST_CHAR);
        const t = 1 - dist / RESOLVE_R;
        const alpha = 0.06 + t * 0.18;
        cell.el.style.color = `rgba(255,255,255,${alpha.toFixed(3)})`;
      } else if (dist < SCRAMBLE_R) {
        startScramble(cell);
        const t = 1 - (dist - RESOLVE_R) / (SCRAMBLE_R - RESOLVE_R);
        const alpha = 0.08 + t * 0.55;
        cell.el.style.color = `rgba(255,255,255,${alpha.toFixed(3)})`;
      } else {
        stopScramble(cell, REST_CHAR);
        cell.el.style.color = 'rgba(255,255,255,0.18)';
      }
    });
  }

  function resetAll() {
    cells.forEach(cell => {
      stopScramble(cell, REST_CHAR);
      cell.el.style.color = 'rgba(255,255,255,0.18)';
    });
  }

  // ── Audio ─────────────────────────────────────────────────────
  let AC;
  function ac() {
    if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
    if (AC.state === 'suspended') AC.resume();
    return AC;
  }

  let lastTick = { x: 0, y: 0 }, lastTickT = 0;
  function maybeTick(x, y) {
    const dx = x - lastTick.x, dy = y - lastTick.y;
    if (dx * dx + dy * dy < 22 * 22) return;
    lastTick = { x, y };
    try {
      const a = ac(), t = a.currentTime;
      if (t - lastTickT < 0.04) return;
      lastTickT = t;
      const freq = 1200 + Math.random() * 800;
      const o = a.createOscillator(), g = a.createGain();
      o.connect(g); g.connect(a.destination);
      o.type = 'square'; o.frequency.setValueAtTime(freq, t);
      o.frequency.exponentialRampToValueAtTime(freq * 0.5, t + 0.04);
      g.gain.setValueAtTime(0.022, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.045);
      o.start(t); o.stop(t + 0.05);
    } catch (_) {}
  }

  function playClick() {
    try {
      const a = ac(), t = a.currentTime;
      // Data burst — rapid square sweeps
      for (let i = 0; i < 4; i++) {
        const o = a.createOscillator(), g = a.createGain();
        o.connect(g); g.connect(a.destination);
        const f = 800 + i * 340;
        o.type = 'square'; o.frequency.setValueAtTime(f, t + i * 0.04);
        o.frequency.exponentialRampToValueAtTime(f * 0.4, t + i * 0.04 + 0.06);
        g.gain.setValueAtTime(0.04, t + i * 0.04);
        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.04 + 0.07);
        o.start(t + i * 0.04); o.stop(t + i * 0.04 + 0.08);
      }
    } catch (_) {}
  }
</script>
</body>
</html>
