<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sdf</title>
  <style>
    :root { --sz: 422px; }
    @media (min-width: 1440px) { :root { --sz: 576px; } }
    @media (max-width: 480px)  { :root { --sz: 322px; } }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; background: #000;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; font-family: system-ui, sans-serif; cursor: none;
    }
    #wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    canvas {
      width: var(--sz); height: var(--sz);
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.06); display: block;
    }
    #meta { display: flex; align-items: center; gap: 24px; }
    #label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.2); }
    #back  { font-size: 10px; letter-spacing: 0.1em; color: rgba(255,255,255,0.15); text-decoration: none; transition: color 0.15s; }
    #back:hover { color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="c"></canvas>
    <div id="meta">
      <a href="index.html" id="back">← lab</a>
      <span id="label">sdf — move + click</span>
    </div>
  </div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js';

const sz = window.innerWidth <= 480 ? 322 : window.innerWidth >= 1440 ? 576 : 422;
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(sz, sz);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
camera.position.z = 1;

const uniforms = {
  uTime:      { value: 0.0 },
  uMouse:     { value: new THREE.Vector2(0.5, 0.5) },
  uClickVel:  { value: new THREE.Vector2(0.0, 0.0) },
  uClickTime: { value: -10.0 },
};

const mat = new THREE.ShaderMaterial({
  uniforms,
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
  `,
  fragmentShader: `
    precision highp float;
    uniform float uTime;
    uniform vec2  uMouse;
    uniform vec2  uClickVel;
    uniform float uClickTime;
    varying vec2  vUv;

    // Smooth minimum — blends two distances
    float smin(float a, float b, float k) {
      float h = clamp(0.5 + 0.5*(b-a)/k, 0.0, 1.0);
      return mix(b, a, h) - k*h*(1.0-h);
    }

    float sdSphere(vec3 p, vec3 c, float r) { return length(p - c) - r; }

    float scene(vec3 p, vec3 mouse3d) {
      float t = uTime;
      float ct = uTime - uClickTime;

      // Click kick — mouse sphere bounces
      vec3 kick = vec3(0.0);
      if (ct < 2.5) kick = vec3(uClickVel, 0.0) * exp(-ct * 2.2) * 0.5;

      float d = sdSphere(p, mouse3d + kick, 0.24);
      d = smin(d, sdSphere(p, vec3(sin(t*0.71)*0.56, cos(t*0.53)*0.44, sin(t*0.29)*0.15), 0.21), 0.38);
      d = smin(d, sdSphere(p, vec3(cos(t*0.63)*0.62, sin(t*0.82)*0.37, cos(t*0.41)*0.18), 0.18), 0.32);
      d = smin(d, sdSphere(p, vec3(sin(t*0.91+1.1)*0.47, cos(t*0.44)*0.54, sin(t*0.6)*0.12), 0.16), 0.30);
      d = smin(d, sdSphere(p, vec3(cos(t*0.52+2.1)*0.38, sin(t*0.73+0.9)*0.48, cos(t*0.78)*0.10), 0.22), 0.34);
      return d;
    }

    vec3 calcNormal(vec3 p, vec3 mouse3d) {
      const float e = 0.0012;
      return normalize(vec3(
        scene(p+vec3(e,0,0), mouse3d) - scene(p-vec3(e,0,0), mouse3d),
        scene(p+vec3(0,e,0), mouse3d) - scene(p-vec3(0,e,0), mouse3d),
        scene(p+vec3(0,0,e), mouse3d) - scene(p-vec3(0,0,e), mouse3d)
      ));
    }

    void main() {
      vec2 uv = (vUv - 0.5) * 2.0;
      vec3 mouse3d = vec3((uMouse - 0.5) * 2.0 * 0.82, 0.0);

      // Ray setup — orthographic-ish
      vec3 ro = vec3(uv * 0.85, 2.6);
      vec3 rd = vec3(0.0, 0.0, -1.0);

      // Ray march
      float tMarch = 0.05;
      float hit = -1.0;
      for (int i = 0; i < 96; i++) {
        vec3 p = ro + rd * tMarch;
        float d = scene(p, mouse3d);
        if (d < 0.0014) { hit = tMarch; break; }
        if (tMarch > 5.5) break;
        tMarch += d * 0.88;
      }

      vec3 col = vec3(0.0);

      if (hit > 0.0) {
        vec3 p = ro + rd * hit;
        vec3 n = calcNormal(p, mouse3d);

        vec3 L1 = normalize(vec3(1.4,  2.0,  2.2));
        vec3 L2 = normalize(vec3(-1.2, -0.8, 1.0));

        float diff1 = max(dot(n, L1), 0.0);
        float diff2 = max(dot(n, L2), 0.0) * 0.18;
        float spec  = pow(max(dot(reflect(-L1, n), -rd), 0.0), 52.0) * 0.55;
        float rim   = pow(1.0 - max(dot(n, -rd), 0.0), 4.0) * 0.38;
        float amb   = 0.10;

        col = vec3(amb + diff1 * 0.72 + diff2 + spec + rim);

        // Subtle depth fog
        col *= 1.0 - (hit - 1.5) * 0.08;
      }

      // Vignette
      float vign = 1.0 - dot(uv * 0.48, uv * 0.48);
      col *= smoothstep(0.0, 1.0, vign);

      gl_FragColor = vec4(col, 1.0);
    }
  `,
});

scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), mat));

// ── Input ──────────────────────────────────────────────────────
let mx = 0.5, my = 0.5;
let prevMx = 0.5, prevMy = 0.5;

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  prevMx = mx; prevMy = my;
  mx = (e.clientX - r.left) / r.width;
  my = 1.0 - (e.clientY - r.top) / r.height;
  maybeTick(e.clientX, e.clientY);
});

canvas.addEventListener('pointerdown', e => {
  const r = canvas.getBoundingClientRect();
  const cx = (e.clientX - r.left) / r.width;
  const cy = 1.0 - (e.clientY - r.top) / r.height;
  // Click velocity = direction from mouse to click point
  uniforms.uClickVel.value.set(cx - mx, cy - my);
  uniforms.uClickTime.value = uniforms.uTime.value;
  playClick();
});

// ── Audio ──────────────────────────────────────────────────────
let AC;
function ac() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
  return AC;
}

let lastTick = { x: 0, y: 0 };
function maybeTick(x, y) {
  const dx = x - lastTick.x, dy = y - lastTick.y;
  if (dx*dx + dy*dy < 24*24) return;
  lastTick = { x, y };
  try {
    const a = ac(), t = a.currentTime;
    // Glass harmonic — two sine partials
    [440, 880].forEach((freq, i) => {
      const o = a.createOscillator(), g = a.createGain();
      o.connect(g); g.connect(a.destination);
      o.type = 'sine'; o.frequency.value = freq;
      g.gain.setValueAtTime(0.038 - i * 0.012, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      o.start(t); o.stop(t + 0.13);
    });
  } catch(_) {}
}

function playClick() {
  try {
    const a = ac(), t = a.currentTime;
    // Deep resonant thud
    const o1 = a.createOscillator(), g1 = a.createGain();
    o1.connect(g1); g1.connect(a.destination);
    o1.type = 'sine'; o1.frequency.setValueAtTime(220, t); o1.frequency.exponentialRampToValueAtTime(44, t + 0.25);
    g1.gain.setValueAtTime(0.28, t); g1.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    o1.start(t); o1.stop(t + 0.3);

    // High ring
    const o2 = a.createOscillator(), g2 = a.createGain();
    o2.connect(g2); g2.connect(a.destination);
    o2.type = 'sine'; o2.frequency.setValueAtTime(3200, t); o2.frequency.exponentialRampToValueAtTime(1100, t + 0.18);
    g2.gain.setValueAtTime(0.04, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    o2.start(t); o2.stop(t + 0.23);
  } catch(_) {}
}

// ── Loop ───────────────────────────────────────────────────────
const clock = new THREE.Clock();
(function animate() {
  requestAnimationFrame(animate);
  uniforms.uTime.value = clock.getElapsedTime();
  uniforms.uMouse.value.set(mx, my);
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
